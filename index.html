<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>권휘석 블로그</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .profile {
      text-align: center;
      margin-bottom: 40px;
    }

    .profile h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .profile p {
      margin-top: 8px;
      font-size: 14px;
      color: #999;
    }

    .section-title {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .post-item {
      display: block;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 16px 20px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .post-item:hover {
      background: #f7f7f7;
    }

    .post-item .post-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: #111;
    }

    .post-item .post-date {
      font-size: 12px;
      color: #bbb;
      margin-top: 4px;
    }

    .more-note {
      font-size: 12px;
      color: #bbb;
      text-align: center;
      margin-bottom: 24px;
    }

    .blog-link {
      display: block;
      text-align: center;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 15px;
      text-decoration: none;
      color: #555;
      font-size: 14px;
      transition: background 0.15s;
    }

    .blog-link:hover {
      background: #f7f7f7;
      color: #111;
    }

    .loading {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 40px 0;
    }

    .error {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <h1>권휘석</h1>
      <p>오늘도 씁니다.</p>
    </div>

    <div class="section-title">최근 글</div>
    <div class="post-list" id="post-list">
      <div class="loading">불러오는 중...</div>
    </div>
    <div class="more-note" id="more-note"></div>

    <a class="blog-link" href="https://blog.naver.com/kwonhuiseok" target="_blank">
      블로그 전체 글 보기 →
    </a>
  </div>

  <script>
    const RSS_URL = 'https://rss.blog.naver.com/kwonhuiseok';
    const PROXY = 'https://api.allorigins.win/get?url=';

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    async function loadPosts() {
      const list = document.getElementById('post-list');
      const note = document.getElementById('more-note');
      try {
        const res = await fetch(PROXY + encodeURIComponent(RSS_URL));
        const data = await res.json();
        const xml = new DOMParser().parseFromString(data.contents, 'text/xml');
        const all = Array.from(xml.querySelectorAll('item'));
        const items = all.slice(0, 3);

        if (items.length === 0) {
          list.innerHTML = '<div class="error">글을 불러올 수 없어요.</div>';
          return;
        }

        list.innerHTML = items.map(item => {
          const title = item.querySelector('title')?.textContent || '';
          const link = item.querySelector('link')?.textContent || '#';
          const pubDate = item.querySelector('pubDate')?.textContent || '';
          return `
            <a class="post-item" href="${link}" target="_blank">
              <div class="post-title">${title}</div>
              <div class="post-date">${pubDate ? formatDate(pubDate) : ''}</div>
            </a>
          `;
        }).join('');

        if (all.length > 3) {
          note.textContent = `+ 이전 글 ${all.length - 3}개가 쌓여 있어요`;
        }
      } catch (e) {
        list.innerHTML = '<div class="error">잠시 후 다시 시도해주세요.</div>';
      }
    }

    loadPosts();
  </script>
</body>
</html>
